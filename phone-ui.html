<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SillyPhone v3 - Ether Shell x Ctrl Core</title>
    <style>
        /* ===== 手机外壳：以太外壳 (Ether Shell) ===== */
        body {
            margin: 0; padding: 0; background: transparent;
            font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
            color: #fff; overflow: hidden;
        }

        .sp-phone-wrap-cv2 {
            width: 320px; height: 550px; margin: 20px auto; padding: 2px;
            border-radius: 38px; position: relative; overflow: hidden;
            background: rgba(34, 34, 40, 0.56); border: 1px solid rgba(72, 72, 82, 0.52);
            box-shadow: 0 22px 44px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }

        /* 灵动岛 */
        .sp-phone-wrap-cv2::before {
            content: ""; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 102px; height: 24px; border-radius: 18px; z-index: 200; pointer-events: none;
            background: rgba(40, 40, 46, 0.48); border: 1px solid rgba(82, 82, 92, 0.2);
            backdrop-filter: blur(2px); transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .sp-phone-wrap-cv2.thinking::before { width: 140px; background: rgba(50, 50, 60, 0.8); box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }

        .sp-phone-screen-cv2 { width: 100%; height: 100%; border-radius: 34px; position: relative; overflow: hidden; background: rgba(72, 72, 80, 0.1); }

        /* 顶部栏 */
        .sp-phone-header-cv2 { height: 52px; padding: 18px 18px 0 18px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 3; }
        .sp-phone-title-cv2 { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.88); }
        .sp-phone-dots-cv2 { display: flex; gap: 5px; cursor: pointer; }
        .sp-phone-dots-cv2 span { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.72); }

        /* 页面容器 */
        .sp-page-container-cv2 {
            position: absolute; top: 52px; bottom: 60px; left: 0; right: 0;
            overflow-y: auto; scrollbar-width: none; display: none; flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        .sp-page-container-cv2.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 聊天区 */
        .sp-chat-body-cv2 { height: 100%; padding: 8px 12px 10px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .sp-chat-body-cv2::-webkit-scrollbar { display: none; }

        /* 消息样式 */
        .sp-message-cv2 { display: flex; align-items: flex-start; gap: 8px; max-width: 100%; margin-bottom: 4px; }
        .sp-message-cv2.self { justify-content: flex-end; }
        .sp-message-avatar-cv2 { width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1); }
        .sp-message-main-cv2 { display: flex; flex-direction: column; max-width: 72%; }
        .sp-message-main-cv2.self { align-items: flex-end; }
        .sp-message-sender-cv2 { margin-bottom: 4px; font-size: 10px; font-weight: 600; color: #C9D4DE; }
        .sp-message-bubble-cv2 {
            padding: 9px 11px; border-radius: 15px; font-size: 12px; line-height: 1.45; word-break: break-word;
            backdrop-filter: blur(10px); box-shadow: 0 6px 14px rgba(0,0,0,0.12);
        }
        .sp-message-bubble-cv2:not(.self) { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.08); color: #EEF4F8; border-top-left-radius: 6px; }
        .sp-message-bubble-cv2.self { background: rgba(45, 45, 45, 0.4); border: 1px solid rgba(255,255,255,0.1); color: #ECEFF4; border-top-right-radius: 6px; }
        .sp-chat-time-cv2 { font-size: 9px; color: #97A3AF; margin-top: 2px; }

        /* 假输入框 */
        .sp-fake-input-cv2 {
            position: absolute; left: 17px; right: 17px; bottom: 10px; height: 34px; border-radius: 20px;
            display: flex; align-items: center; gap: 10px; padding: 0 12px;
            background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px); cursor: text;
        }
        .sp-fake-input-text-cv2 { flex: 1; font-size: 10px; color: rgba(255,255,255,0.42); overflow: hidden; }

        /* 通讯录 & 朋友圈 */
        .sp-contact-list-cv2 { padding: 10px; gap: 10px; display: flex; flex-direction: column; }
        .sp-contact-item-cv2 {
            display: flex; align-items: center; gap: 12px; padding: 10px;
            background: rgba(255, 255, 255, 0.05); border-radius: 12px; cursor: pointer;
        }
        .sp-contact-avatar-cv2 { width: 40px; height: 40px; border-radius: 12px; background-size: cover; }
        .sp-contact-name-cv2 { font-size: 14px; font-weight: 600; }

        .sp-moments-feed-cv2 { padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        .sp-moment-item-cv2 { background: rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }

        /* 底部导航 */
        .sp-bottom-nav-cv2 {
            position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
            background: rgba(40, 40, 46, 0.85); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .sp-nav-item-cv2 { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .sp-nav-item-cv2.active { opacity: 1; transform: translateY(-2px); }
        .sp-nav-text-cv2 { font-size: 10px; font-weight: 500; }

        /* 真实提示 */
        #real-input-container { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(20, 20, 25, 0.95); backdrop-filter: blur(20px); padding: 10px 15px 30px 15px; transform: translateY(100%); transition: 0.3s; z-index: 200; border-top: 1px solid rgba(255,255,255,0.1); }
        #real-input-container.active { transform: translateY(0); }
        #real-msg-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; padding: 10px; font-size: 14px; outline: none; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: none; z-index: 150; }
        
        .sp-photo-img-cv2 { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="overlay"></div>

    <div class="sp-phone-wrap-cv2" id="phone-shell">
        <div class="sp-phone-screen-cv2">
            <!-- 顶部栏 -->
            <div class="sp-phone-header-cv2">
                <div class="sp-phone-title-cv2" id="chat-title">消息</div>
                <div class="sp-phone-dots-cv2" id="settings-btn"><span></span><span></span><span></span></div>
            </div>

            <!-- 页面容器 -->
            <div id="page-messages" class="sp-page-container-cv2 active">
                <div class="sp-chat-body-cv2" id="chat-body"></div>
                <div class="sp-fake-input-cv2" id="fake-input-trigger">
                    <span class="sp-fake-input-text-cv2">发送消息...</span>
                </div>
            </div>

            <div id="page-contacts" class="sp-page-container-cv2">
                <div class="sp-contact-list-cv2" id="contact-list"></div>
            </div>

            <div id="page-moments" class="sp-page-container-cv2">
                <div class="sp-moments-feed-cv2" id="moments-feed"></div>
            </div>

            <!-- 底部导航栏 -->
            <div class="sp-bottom-nav-cv2">
                <div class="sp-nav-item-cv2 active" data-page="messages">
                    <div class="sp-nav-text-cv2">消息</div>
                </div>
                <div class="sp-nav-item-cv2" data-page="contacts">
                    <div class="sp-nav-text-cv2">通讯录</div>
                </div>
                <div class="sp-nav-item-cv2" data-page="moments">
                    <div class="sp-nav-text-cv2">朋友圈</div>
                </div>
            </div>

            <!-- 输入面板 -->
            <div id="real-input-container">
                <textarea id="real-msg-input" placeholder="输入消息..." rows="1"></textarea>
                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <div style="display: flex; gap: 15px;">
                        <span id="open-photo" style="cursor: pointer; opacity: 0.7; font-size: 12px;">照片</span>
                    </div>
                    <span id="send-btn" style="cursor: pointer; color: #4F46E5; font-weight: 700;">发送</span>
                </div>
            </div>
            <input type="file" id="real-photo-input" style="display: none;" accept="image/*">
        </div>
    </div>

    <script>
/**
 * SillyPhone v3 - Ether Shell x Ctrl Core (Ported)
 */
(function() {
    const state = {
        userName: 'User',
        userAvatar: 'https://files.catbox.moe/blaehb.jpg',
        currentMsgId: null,
        messageHistory: [],
        privateConversations: [],
        groupConversations: [],
        moments: [],
        currentChat: null,
        activeTab: 'messages',
        syncTimer: null,
        visionMode: 'tavern' // tavern, kimi, custom
    };

    const st = {
        getChatMessages: (id) => (typeof getChatMessages === 'function' ? getChatMessages(id) : []),
        setChatMessages: (msgs, opts) => (typeof setChatMessages === 'function' ? setChatMessages(msgs, opts) : null),
        getCurrentMessageId: () => (typeof getCurrentMessageId === 'function' ? getCurrentMessageId() : null),
        generateRaw: (data) => (typeof generateRaw === 'function' ? generateRaw(data) : null),
        getContext: () => (typeof SillyTavern !== 'undefined' && SillyTavern.getContext ? SillyTavern.getContext() : {})
    };

    // --- 逻辑：解析 & 同步 (Ctrl Core) ---

    function parseMessageLine(line) {
        line = line.trim();
        if (!line.startsWith('[') || !line.endsWith(']')) return null;
        const content = line.substring(1, line.length - 1);
        const parts = content.split('|');
        if (parts[0] === '我方消息') {
            if (parts[1] === '图片') return { senderId: 'user', type: 'photo', url: parts[3].replace('IMGDATA:', ''), time: parts[parts.length - 1] };
            return { senderId: 'user', type: 'text', text: parts[1], time: parts[2] };
        }
        if (parts.length >= 4) return { senderId: 'char', senderName: parts[0], senderAvatar: parts[1], text: parts[2], time: parts[3] };
        return null;
    }

    function serializeMessage(msg) {
        const time = msg.time || new Date().getHours() + ':' + new Date().getMinutes().toString().padStart(2, '0');
        if (msg.senderId === 'user') {
            if (msg.type === 'photo') return `[我方消息|图片|${msg.description || ''}|IMGDATA:${msg.url || ''}|FILENAME:${msg.fileName || ''}|${time}]`;
            return `[我方消息|${msg.text}|${time}]`;
        }
        return `[${msg.senderName || 'Char'}|${msg.senderAvatar || ''}|${msg.text}|${time}]`;
    }

    function loadFromSameLayer() {
        const id = st.getCurrentMessageId();
        if (id === null) return;
        state.currentMsgId = id;
        const messages = st.getChatMessages(id);
        if (!messages || messages.length === 0) return;
        const raw = messages[0].message || '';
        const shoujiMatch = raw.match(/<shouji>([\s\S]*?)<\/shouji>/);
        if (!shoujiMatch) return;
        const content = shoujiMatch[1];

        // 私聊
        const privateBlocks = [...content.matchAll(/<private>([\s\S]*?)<\/private>/g)];
        state.privateConversations = privateBlocks.map(m => {
            const block = m[1].trim();
            const nameMatch = block.split('\n')[0].match(/【和(.*?)的聊天】/);
            const name = nameMatch ? nameMatch[1] : '匿名会话';
            const msgs = block.split('\n').slice(1).map(parseMessageLine).filter(Boolean);
            return { name, messages: msgs };
        });

        // 朋友圈
        const pyqMatch = content.match(/<pyq>([\s\S]*?)<\/pyq>/);
        if (pyqMatch) {
            // 简单朋友圈解析逻辑 (可扩展)
            state.moments = pyqMatch[1].trim().split('\n').map(line => ({ text: line }));
        }

        if (state.privateConversations.length > 0) switchChat(0);
        renderContacts();
        renderMoments();
    }

    function syncToST() {
        if (state.currentMsgId === null) return;
        const id = state.currentMsgId;
        const messages = st.getChatMessages(id);
        if (!messages || messages.length === 0) return;
        const raw = messages[0].message || '';

        let newShouji = '';
        state.privateConversations.forEach(conv => {
            newShouji += `<private>\n【和${conv.name}的聊天】\n`;
            conv.messages.forEach(m => { newShouji += serializeMessage(m) + '\n'; });
            newShouji += `</private>\n`;
        });

        if (state.moments.length > 0) {
            newShouji += `<pyq>\n${state.moments.map(m => m.text).join('\n')}\n</pyq>\n`;
        }

        const newTag = `<shouji>\n${newShouji.trim()}\n</shouji>`;
        const updated = raw.includes('<shouji>') ? raw.replace(/<shouji>[\s\S]*?<\/shouji>/, newTag) : raw + '\n' + newTag;
        st.setChatMessages([{ message_id: id, message: updated }], { refresh: 'none' });
    }

    function deferredSync(delay = 500) {
        if (state.syncTimer) clearTimeout(state.syncTimer);
        state.syncTimer = setTimeout(syncToST, delay);
    }

    // --- UI 渲染 ---

    function renderMessages() {
        const body = document.getElementById('chat-body');
        body.innerHTML = '';
        state.messageHistory.forEach(msg => {
            const isSelf = msg.senderId === 'user';
            const row = document.createElement('div');
            row.className = `sp-message-cv2 ${isSelf ? 'self' : ''}`;
            const avatar = isSelf ? state.userAvatar : (msg.senderAvatar || 'https://files.catbox.moe/haxtdn.jpeg');
            const content = msg.type === 'photo' ? 
                `<img src="${msg.url}" class="sp-photo-img-cv2" onclick="window.open('${msg.url}')">` : 
                `<div class="sp-message-bubble-cv2 ${isSelf ? 'self' : ''}">${msg.text}</div>`;
            
            row.innerHTML = `
                ${!isSelf ? `<div class="sp-message-avatar-cv2" style="background-image: url('${avatar}')"></div>` : ''}
                <div class="sp-message-main-cv2 ${isSelf ? 'self' : ''}">
                    <div class="sp-message-sender-cv2 ${isSelf ? 'self' : ''}">${isSelf ? state.userName : msg.senderName}</div>
                    <div class="sp-message-row-cv2 ${isSelf ? 'self' : ''}">
                        ${content}
                    </div>
                    <div class="sp-chat-time-cv2">${msg.time}</div>
                </div>
                ${isSelf ? `<div class="sp-message-avatar-cv2" style="background-image: url('${avatar}')"></div>` : ''}
            `;
            body.appendChild(row);
        });
        body.scrollTop = body.scrollHeight;
    }

    function renderContacts() {
        const list = document.getElementById('contact-list');
        list.innerHTML = '';
        state.privateConversations.forEach((conv, idx) => {
            const item = document.createElement('div');
            item.className = 'sp-contact-item-cv2';
            item.innerHTML = `
                <div class="sp-contact-avatar-cv2" style="background-image: url('https://files.catbox.moe/haxtdn.jpeg')"></div>
                <div class="sp-contact-info-cv2">
                    <div class="sp-contact-name-cv2">${conv.name}</div>
                    <div class="sp-contact-last-msg-cv2">${conv.messages.length ? conv.messages[conv.messages.length-1].text : '暂无消息'}</div>
                </div>
            `;
            item.onclick = () => {
                switchChat(idx);
                switchPage('messages');
            };
            list.appendChild(item);
        });
    }

    function renderMoments() {
        const feed = document.getElementById('moments-feed');
        feed.innerHTML = '';
        state.moments.forEach(m => {
            const item = document.createElement('div');
            item.className = 'sp-moment-item-cv2';
            item.innerHTML = `<div class="sp-moment-content-cv2">${m.text}</div>`;
            feed.appendChild(item);
        });
    }

    function switchPage(page) {
        state.activeTab = page;
        document.querySelectorAll('.sp-page-container-cv2').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${page}`).classList.add('active');
        document.querySelectorAll('.sp-nav-item-cv2').forEach(i => i.classList.remove('active'));
        document.querySelector(`.sp-nav-item-cv2[data-page="${page}"]`).classList.add('active');
        
        const titles = { messages: state.currentChat ? state.currentChat.name : '消息', contacts: '通讯录', moments: '朋友圈' };
        document.getElementById('chat-title').textContent = titles[page];
    }

    function switchChat(index) {
        state.currentChat = state.privateConversations[index];
        state.messageHistory = state.currentChat.messages;
        renderMessages();
    }

    // --- 交互 ---

    async function handleSendMessage() {
        const input = document.getElementById('real-msg-input');
        const text = input.value.trim();
        if (!text) return;

        const time = new Date().getHours() + ':' + new Date().getMinutes().toString().padStart(2, '0');
        const msg = { senderId: 'user', type: 'text', text: text, time };
        
        if (!state.currentChat) {
            state.currentChat = { name: 'AI', messages: [] };
            state.privateConversations.push(state.currentChat);
        }
        
        state.messageHistory.push(msg);
        input.value = '';
        renderMessages();
        deferredSync();
        triggerAIResponse(text);
    }

    async function triggerAIResponse(userInput) {
        if (!st.generateRaw) return;
        document.getElementById('phone-shell').classList.add('thinking');
        try {
            const ctx = st.getContext();
            // 识图检测 (Ctrl 逻辑简述)
            let injectPrompt = "";
            const lastMsg = state.messageHistory[state.messageHistory.length - 1];
            if (lastMsg && lastMsg.type === 'photo') {
                injectPrompt = `[用户发送了一张图片，请根据视觉信息回复]`;
            }

            const response = await st.generateRaw({ 
                user_input: userInput, 
                should_silence: true,
                injects: [{ role: 'system', content: injectPrompt, position: 'in_chat' }]
            });
            
            if (response) {
                const aiMsg = {
                    senderId: 'char', senderName: ctx.character_name || 'AI',
                    senderAvatar: ctx.character_avatar || '',
                    text: String(response).trim(),
                    time: new Date().getHours() + ':' + new Date().getMinutes().toString().padStart(2, '0')
                };
                state.messageHistory.push(aiMsg);
                renderMessages();
                deferredSync();
            }
        } catch (e) { console.error(e); } finally { document.getElementById('phone-shell').classList.remove('thinking'); }
    }

    // --- 事件绑定 ---
    document.getElementById('fake-input-trigger').onclick = () => {
        document.getElementById('real-input-container').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('real-msg-input').focus();
    };

    document.getElementById('overlay').onclick = () => {
        document.getElementById('real-input-container').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
    };

    document.getElementById('send-btn').onclick = handleSendMessage;
    document.getElementById('real-msg-input').onkeypress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); }
    };

    document.querySelectorAll('.sp-nav-item-cv2').forEach(item => {
        item.onclick = () => switchPage(item.dataset.page);
    });

    document.getElementById('open-photo').onclick = () => document.getElementById('real-photo-input').click();
    document.getElementById('real-photo-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const upload = (window.parent && window.parent.__uploadImageByPlugin) || window.__uploadImageByPlugin;
        if (upload) {
            const url = await upload(file);
            const msg = {
                senderId: 'user', type: 'photo', url: (typeof url === 'string' ? url : url.url),
                time: new Date().getHours() + ':' + new Date().getMinutes().toString().padStart(2, '0')
            };
            state.messageHistory.push(msg);
            renderMessages();
            deferredSync();
            triggerAIResponse("[图片]");
        }
    };

    window.onload = loadFromSameLayer;
})();
    </script>
</body>
</html>
