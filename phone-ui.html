<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SillyPhone Premium</title>
    <style>
        /* ===== 基础与变量 ===== */
        :root {
            --phone-width: 330px;
            --phone-height: 600px;
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(100, 150, 255, 0.15);
            --text-main: rgba(255, 255, 255, 0.9);
            --text-dim: rgba(255, 255, 255, 0.5);
            --ui-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent;
            font-family: var(--ui-font);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== 手机外壳 (基于用户美化方案升级) ===== */
        .phone-shell {
            width: var(--phone-width);
            height: var(--phone-height);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 42px;
            position: relative;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s ease-out;
        }

        .phone-shell::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* 灵动岛 (Dynamic Island) */
        .dynamic-island {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 26px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dynamic-island.active {
            width: 180px;
            height: 34px;
            background: rgba(10, 10, 15, 0.9);
        }

        .dynamic-island-status {
            font-size: 10px;
            color: white;
            opacity: 0;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .dynamic-island.active .dynamic-island-status {
            opacity: 1;
        }

        /* 顶部栏 */
        .phone-header {
            height: 60px;
            padding: 24px 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .phone-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.2px;
        }

        .status-dots {
            display: flex;
            gap: 4px;
        }

        .status-dots span {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }

        /* 聊天主体 */
        .chat-body {
            flex: 1;
            padding: 15px 15px 80px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }

        .chat-body::-webkit-scrollbar {
            display: none;
        }

        /* ===== 消息气泡 ===== */
        .msg-row {
            display: flex;
            flex-direction: column;
            width: 100%;
            animation: slideIn 0.3s ease-out;
        }

        .msg-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 85%;
        }

        .msg-row.self .msg-container {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bubble-wrap {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-row.self .bubble-wrap {
            align-items: flex-end;
        }

        .sender-name {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-dim);
            margin-left: 2px;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13.5px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .msg-row.self .bubble {
            background: rgba(60, 120, 255, 0.25);
            border-color: rgba(60, 120, 255, 0.2);
            border-bottom-right-radius: 4px;
        }

        .msg-row:not(.self) .bubble {
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
        }

        /* 系统消息 */
        .sys-msg {
            align-self: center;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 10px;
            color: var(--text-dim);
            margin: 8px 0;
        }

        /* 时间分割 */
        .time-divider {
            align-self: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.25);
            margin: 20px 0 10px;
        }

        /* ===== 特殊内容类型 ===== */
        .media-content {
            border-radius: 12px;
            max-width: 200px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .media-img {
            width: 100%;
            display: block;
        }

        .voice-bubble {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
        }

        .voice-icon {
            opacity: 0.7;
        }

        /* ===== 输入区域 ===== */
        .input-area {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 15px;
            height: 48px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 4px 0 15px;
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        #phone-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 13px;
            outline: none;
            padding-right: 10px;
        }

        #phone-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: rgba(60, 120, 255, 0.4);
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transform: rotate(-30deg);
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        .sync-pulse {
            width: 6px;
            height: 6px;
            background: #4A90E2;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

    </style>
</head>
<body>

    <div class="phone-shell">
        <!-- 灵动岛 -->
        <div class="dynamic-island" id="dynamic-island">
            <div class="sync-pulse" id="sync-pulse" style="display: none;"></div>
            <div class="dynamic-island-status" id="dynamic-status">数据同步中...</div>
        </div>

        <div class="phone-header">
            <div class="phone-title" id="char-name-title">Messages</div>
            <div class="status-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="chat-body" id="chat-body">
            <!-- 消息列表 -->
        </div>

        <div class="input-area">
            <input type="text" id="phone-input" placeholder="输入消息..." autocomplete="off">
            <button class="send-btn" id="send-btn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const state = {
            currentMsgId: null,
            messageHistory: [],
            charName: "Character",
            userName: "User",
            charAvatar: "",
            userAvatar: "",
            isSyncing: false,
            syncTimeout: null
        };

        // ===== 核心接口检测与初始化 =====
        async function init() {
            try {
                // 检测 SillyTavern 注入函数
                if (typeof getCurrentMessageId !== 'function') {
                    console.error("未检测到 JS-Slash-Runner 环境");
                    showSystemMsg("❗ 环境异常：请在 SillyTavern 中运行");
                    return;
                }

                state.currentMsgId = getCurrentMessageId();
                if (state.currentMsgId === null) {
                    showSystemMsg("❗ 未找到当前楼层 ID");
                    return;
                }

                // 获取名称与头像
                if (typeof getCurrentCharName === 'function') state.charName = getCurrentCharName();
                if (typeof getCurrentCharAvatar === 'function') state.charAvatar = getCurrentCharAvatar();
                if (typeof getUserAvatar === 'function') state.userAvatar = getUserAvatar();

                document.getElementById('char-name-title').innerText = state.charName;

                await loadHistory();
                
            } catch (e) {
                console.error("初始化失败:", e);
            }
        }

        // ===== 数据加载与解析 =====
        async function loadHistory() {
            try {
                const messages = getChatMessages(state.currentMsgId);
                if (!messages || !messages[0]) return;

                const rawText = String(messages[0].message || "");
                state.messageHistory = parseSillyPhoneLog(rawText);
                renderAllMessages();
            } catch (e) {
                console.error("加载历史失败:", e);
            }
        }

        function parseSillyPhoneLog(text) {
            const history = [];
            // 支持多种容器标签，或者直接解析全文
            const content = text.match(/<(?:phone_chat|shouji)>([\s\S]*?)<\/(?:phone_chat|shouji)>/)?.[1] || text;
            
            // 正则匹配 {网名|内容|时间}、{时间提示|时间}、{系统提示|内容}
            const regex = /\{(.*?)\|(.*?)\|(.*?)\}/g;
            const sysRegex = /\{系统提示\|(.*?)\}/g;
            const timeRegex = /\{时间提示\|(.*?)\}/g;

            // 这是一个简单的按顺序解析逻辑
            // 为了简单起见，我们先用一种通用的正则匹配所有括号内容，再内部判断类型
            const allBlocks = text.match(/\{.*?\}/g) || [];
            
            allBlocks.forEach(block => {
                const parts = block.slice(1, -1).split('|');
                if (parts.length === 2) {
                    if (parts[0] === '系统提示') {
                        history.push({ type: 'system', content: parts[1] });
                    } else if (parts[0] === '时间提示') {
                        history.push({ type: 'time', content: parts[1] });
                    }
                } else if (parts.length >= 3) {
                    // 处理 {网名|内容|时间} 或更复杂的格式
                    const [name, content, time] = parts;
                    let type = 'text';
                    let realContent = content;
                    let extra = {};

                    // 检测特殊前缀 (如 图片:xxx, 语音时长:xxx)
                    if (content.startsWith('图片:')) {
                        type = 'image';
                        realContent = content.replace('图片:', '').trim();
                    } else if (content.startsWith('语音时长:')) {
                        type = 'voice';
                        const voiceParts = content.split(':');
                        extra.duration = voiceParts[1];
                        realContent = voiceParts.slice(2).join(':'); // 语音内容
                    } else if (content.startsWith('表情包')) {
                        type = 'sticker';
                    } else if (content.startsWith('转账:')) {
                        type = 'transfer';
                    } else if (content.startsWith('已收款:')) {
                        type = 'received';
                    }

                    history.push({
                        type,
                        name,
                        content: realContent,
                        time,
                        isSelf: (name === 'Chaos' || name === 'You' || name === 'User'), // 简单判断，后续可优化
                        extra
                    });
                }
            });

            return history;
        }

        // ===== 渲染逻辑 =====
        function renderAllMessages() {
            const container = document.getElementById('chat-body');
            container.innerHTML = '';
            state.messageHistory.forEach(msg => appendMessageDOM(msg));
            scrollToBottom();
        }

        function appendMessageDOM(msg) {
            const container = document.getElementById('chat-body');
            let html = '';

            if (msg.type === 'system') {
                html = `<div class="sys-msg">${msg.content}</div>`;
            } else if (msg.type === 'time') {
                html = `<div class="time-divider">${msg.content}</div>`;
            } else {
                const isSelf = msg.isSelf;
                const avatar = isSelf ? state.userAvatar : state.charAvatar;
                
                let contentHTML = msg.content;
                if (msg.type === 'image') {
                    contentHTML = `<div class="media-content"><img src="${msg.content}" class="media-img"></div>`;
                } else if (msg.type === 'voice') {
                    contentHTML = `<div class="voice-bubble"><span class="voice-icon">🔊 ${msg.extra.duration}</span><span>${msg.content}</span></div>`;
                }

                html = `
                    <div class="msg-row ${isSelf ? 'self' : ''}">
                        <div class="msg-container">
                            <div class="avatar" style="background-image: url('${avatar}')"></div>
                            <div class="bubble-wrap">
                                <span class="sender-name">${msg.name}</span>
                                <div class="bubble">${contentHTML}</div>
                                <span class="msg-time">${msg.time}</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            container.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function showSystemMsg(text) {
            appendMessageDOM({ type: 'system', content: text });
        }

        function scrollToBottom() {
            const chatBody = document.getElementById('chat-body');
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // ===== 交互与同步 =====
        document.getElementById('send-btn').onclick = handleSend;
        document.getElementById('phone-input').onkeypress = (e) => {
            if (e.key === 'Enter') handleSend();
        };

        async function handleSend() {
            const input = document.getElementById('phone-input');
            const content = input.value.trim();
            if (!content) return;

            input.value = '';
            
            // 构造消息对象
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msg = {
                type: 'text',
                name: 'Chaos', // 默认用户网名
                content: content,
                time: time,
                isSelf: true
            };

            state.messageHistory.push(msg);
            appendMessageDOM(msg);
            
            await syncToSillyTavern();
            await triggerAI();
        }

        async function syncToSillyTavern() {
            setSyncStatus(true);
            try {
                const rawText = serializeHistory();
                // 包裹在 <phone_chat> 标签中
                const fullText = `<phone_chat>\n${rawText}\n</phone_chat>`;
                
                await setChatMessages([{
                    message_id: state.currentMsgId,
                    message: fullText
                }], { refresh: 'none' });

            } catch (e) {
                console.error("同步失败:", e);
            } finally {
                setTimeout(() => setSyncStatus(false), 800);
            }
        }

        function serializeHistory() {
            return state.messageHistory.map(msg => {
                if (msg.type === 'system') return `{系统提示|${msg.content}}`;
                if (msg.type === 'time') return `{时间提示|${msg.content}}`;
                
                let content = msg.content;
                if (msg.type === 'image') content = `图片:${msg.content}`;
                if (msg.type === 'voice') content = `语音时长:${msg.extra.duration}:${msg.content}`;
                
                return `{${msg.name}|${content}|${msg.time}}`;
            }).join('\n');
        }

        async function triggerAI() {
            if (typeof generateRaw !== 'function') return;

            setIslandActive(true, "对方正在输入...");
            
            try {
                const response = await generateRaw({
                    ordered_prompts: [
                        { role: 'system', content: '你现在在手机聊天模式。只输出格式为 {网名|内容|时间} 的内容。' },
                        'chat_history',
                        'user_input'
                    ],
                    user_input: "不要解释，直接回复聊天内容。",
                    should_stream: false 
                });

                if (response) {
                    const newMsgs = parseSillyPhoneLog(response);
                    newMsgs.forEach(m => {
                        m.isSelf = false;
                        state.messageHistory.push(m);
                        appendMessageDOM(m);
                    });
                    await syncToSillyTavern();
                }
            } catch (e) {
                console.error("AI 生成失败:", e);
            } finally {
                setIslandActive(false);
            }
        }

        function setIslandActive(active, text = "") {
            const island = document.getElementById('dynamic-island');
            const status = document.getElementById('dynamic-status');
            if (active) {
                island.classList.add('active');
                status.innerText = text;
            } else {
                island.classList.remove('active');
            }
        }

        function setSyncStatus(syncing) {
            const pulse = document.getElementById('sync-pulse');
            pulse.style.display = syncing ? 'block' : 'none';
        }

        // 启动
        window.onload = init;
    </script>
</body>
</html>
